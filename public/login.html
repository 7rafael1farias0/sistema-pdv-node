<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PDV</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-box">
        <h2>Acesso ao PDV</h2>
        <form id="formLogin">
            <input type="text" id="usuario" placeholder="Usuário" required autocomplete="off">
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
            <div id="mensagemErro" class="erro">Usuário ou senha inválidos!</div>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de recarregar "piscando"

            // 1. Pega os valores que você digitou
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const msgErro = document.getElementById('mensagemErro');

            try {
                // 2. Manda pro servidor
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                const dados = await res.json();

                if (res.ok) {
                    // 3. Salva os "Crachás" de segurança
                    localStorage.setItem('pdv_token', dados.token);
                    localStorage.setItem('pdv_cargo', dados.cargo);

                    // 4. Catraca Inteligente (Redirecionamento)
                    window.location.href = 'painel.html';

                    // Exibe a mensagem de erro bonita no HTML
                    msgErro.innerText = dados.erro || "Usuário ou senha inválidos!";
                    msgErro.style.display = 'block';
                }
            } catch (erro) {
                console.error("Erro no login:", erro);
                msgErro.innerText = "Erro ao conectar com o servidor.";
                msgErro.style.display = 'block';
            }
        });

    </script>
</body>

</html>
