<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard & Relatórios</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .kpi-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 25px 20px; border-radius: 4px; text-align: center; }
        .kpi-titulo { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .kpi-valor { font-size: 2em; font-weight: bold; }
        .valor-azul { color: var(--azul-neon); text-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .valor-verde { color: var(--verde-ok); text-shadow: 0 0 10px rgba(46, 213, 115, 0.2); }
        .valor-branco { color: #ffffff; }
        .valor-cinza { color: #aaaaaa; }
        .grafico-container { background: #050505; border: 1px solid var(--border-color); padding: 20px; border-radius: 4px; height: 350px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav">
            <div class="nav-links">
                <a href="painel.html" class="btn-nav">
                    <span class="material-symbols-outlined icone-btn">home</span> Início
                </a>
            </div>
            <h1>DASHBOARD FINANCEIRO</h1>
            <button class="btn-sair" onclick="fazerLogout()">
                <span class="material-symbols-outlined icone-btn">logout</span> Sair
            </button>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-titulo">Faturamento Bruto</div>
                <div class="kpi-valor valor-azul" id="kpiFaturamento">R$ 0,00</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-titulo">Lucro Líquido</div>
                <div class="kpi-valor valor-verde" id="kpiLucro">R$ 0,00</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-titulo">Total de Vendas</div>
                <div class="kpi-valor valor-branco" id="kpiVendas">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-titulo">Margem Média</div>
                <div class="kpi-valor valor-cinza" id="kpiMargem">0%</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
            <div class="grafico-container">
                <h3 style="color: #666; font-size: 13px; margin-top: 0;">TOP 5 - PRODUTOS MAIS VENDIDOS (UNIDADES)</h3>
                <canvas id="graficoTopProdutos"></canvas>
            </div>

            <div class="card" style="margin-bottom: 0;">
                <h3 style="display: flex; align-items: center;">
                    <span class="material-symbols-outlined icone-btn" style="color:#aaa;">analytics</span> Relatórios Oficiais
                </h3>
                <p style="color: #666; font-size: 12px; margin-bottom: 20px; line-height: 1.5;">
                    Baixe o histórico completo de transações para abrir no Excel ou enviar para a contabilidade.
                </p>
                <button onclick="exportarCSV()" class="btn-processar" style="width: 100%; padding: 15px; font-size: 12px; display: flex; align-items: center; justify-content: center;">
                    <span class="material-symbols-outlined icone-btn">download</span> EXPORTAR VENDAS (CSV)
                </button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('pdv_token');
        const cargo = localStorage.getItem('pdv_cargo');

        if (!token) window.location.href = 'login.html';
        if (cargo !== 'gerente') { alert("⚠️ Acesso restrito a Gerentes."); window.location.href = 'painel.html'; }

        async function carregarDashboard() {
            try {
                const res = await fetch('/api/relatorios', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error("Erro ao buscar dados");
                const dados = await res.json();
                atualizarKPIs(dados.totais);
                renderizarGrafico(dados.topProdutos);
            } catch (erro) { console.error(erro); alert("❌ Erro ao carregar o painel financeiro."); }
        }

        function atualizarKPIs(totais) {
            document.getElementById('kpiFaturamento').innerText = `R$ ${totais.faturamento.toFixed(2)}`;
            document.getElementById('kpiLucro').innerText = `R$ ${totais.lucroTotal.toFixed(2)}`;
            document.getElementById('kpiVendas').innerText = totais.totalVendas;
            document.getElementById('kpiMargem').innerText = `${totais.margemMedia.toFixed(1)}%`;
        }

        let meuGrafico = null;
        function renderizarGrafico(produtos) {
            const ctx = document.getElementById('graficoTopProdutos').getContext('2d');
            if (meuGrafico) meuGrafico.destroy();
            const nomes = produtos.map(p => p.nome.toUpperCase());
            const quantidades = produtos.map(p => p.qtdVendida);

            meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: nomes,
                    datasets: [{ label: 'Unidades', data: quantidades, backgroundColor: 'rgba(0, 242, 254, 0.2)', borderColor: '#00f2fe', borderWidth: 1, borderRadius: 2 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#1a1a1a' }, ticks: { color: '#666', stepSize: 1 } }, x: { grid: { display: false }, ticks: { color: '#aaa', font: { size: 10 } } } } }
            });
        }

        function exportarCSV() { window.location.href = `/api/exportar-vendas?token=${token}`; }
        function fazerLogout() { localStorage.clear(); window.location.href = 'login.html'; }
        
        carregarDashboard();
    </script>
</body>
</html>
