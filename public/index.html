<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frente de Caixa - PDV</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .grid-caixa {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            align-items: start;
        }
        
        /* Destaque especial para o painel de cobrança */
        .painel-total-card {
            border-color: var(--azul-neon);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.05);
            text-align: center;
            padding: 40px 25px;
        }
        
        /* Ajuste fino para o input do leitor de código de barras */
        .input-barras {
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .input-barras::placeholder { font-weight: normal; letter-spacing: normal; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="nav">
            <div class="nav-links">
                <a href="painel.html" class="btn-nav">
                    <span class="material-symbols-outlined icone-btn">home</span> Início
                </a>
            </div>
            <h1>FRENTE DE CAIXA</h1>
            <button class="btn-sair" onclick="fazerLogout()">
                <span class="material-symbols-outlined icone-btn">logout</span> Sair
            </button>
        </div>

        <div class="grid-caixa">
            
            <div>
                <div class="card flex-row-center" style="padding: 20px;">
                    <input type="text" id="buscaProduto" class="input-barras" placeholder="Bipar Código (SKU)..." autofocus style="flex: 3; margin: 0;">
                    <input type="number" id="qtdProduto" value="1" min="1" style="flex: 1; margin: 0; text-align: center; font-weight: bold;">
                    <button onclick="adicionarAoCarrinho()" class="btn-processar" style="flex: 1.5; margin: 0;">
                        <span class="material-symbols-outlined icone-btn">add_shopping_cart</span> Adicionar
                    </button>
                </div>

                <div class="card" style="margin-top: 20px; min-height: 400px; overflow-x: auto;">
                    <h3 style="color: var(--text-muted); font-size: 12px; margin-top: 0;">CUPOM FISCAL / ITENS DA COMPRA</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>PRODUTO</th>
                                <th style="text-align: center;">QTD</th>
                                <th style="text-align: right;">UNITÁRIO</th>
                                <th style="text-align: right;">SUBTOTAL</th>
                                <th style="text-align: center;">AÇÃO</th>
                            </tr>
                        </thead>
                        <tbody id="listaCarrinho">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="card painel-total-card">
                <h3 style="color: var(--text-muted); margin: 0; font-size: 14px;">TOTAL DA COMPRA</h3>
                <div class="valor-gigante" id="valorTotal" style="margin: 30px 0;">R$ 0.00</div>
                
                <button onclick="finalizarVenda()" class="btn-processar" id="btnFinalizar" 
                        style="width: 100%; height: 60px; font-size: 15px; border-width: 2px;" disabled>
                    <span class="material-symbols-outlined icone-btn" style="font-size: 20px;">payments</span> FINALIZAR VENDA
                </button>
            </div>

        </div>

    </div> <script>
        const token = localStorage.getItem('pdv_token');
        const cargo = localStorage.getItem('pdv_cargo');

        if (!token) window.location.href = 'login.html';
        if (cargo === 'estoquista') {
            alert("⚠️ Acesso Negado: Você não tem permissão para operar o caixa.");
            window.location.href = 'painel.html';
        }

        function fazerLogout() { localStorage.clear(); window.location.href = 'login.html'; }

        let produtosCatalogo = [];
        let carrinho = [];

        async function carregarCatalogo() {
            try {
                const res = await fetch('/api/produtos', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 401) return fazerLogout();
                produtosCatalogo = await res.json();
            } catch (erro) { console.error("Erro ao conectar com o banco:", erro); }
        }

        function adicionarAoCarrinho() {
            const busca = document.getElementById('buscaProduto').value.trim().toUpperCase();
            const qtd = parseInt(document.getElementById('qtdProduto').value) || 1;

            if (!busca) return;
            if (!produtosCatalogo.length) return alert("❌ O sistema não carregou os produtos. Verifique sua conexão.");

            const produto = produtosCatalogo.find(p => p.codigo.toUpperCase() === busca);

            if (!produto) {
                alert(`❌ SKU '${busca}' não cadastrado!`);
                document.getElementById('buscaProduto').value = '';
                return;
            }

            const precoFinal = (produto.emPromocao === 1 && produto.precoPromocao > 0) ? produto.precoPromocao : produto.precoVenda;

            const itemExistente = carrinho.find(i => i.codigo === produto.codigo);
            const qtdNoCarrinho = itemExistente ? itemExistente.qtd : 0;

            if (qtdNoCarrinho + qtd > produto.estoque) {
                return alert(`⚠️ Estoque insuficiente! O limite para este item é ${produto.estoque}.`);
            }

            if (itemExistente) {
                itemExistente.qtd += qtd;
                itemExistente.subtotal = itemExistente.qtd * precoFinal;
                itemExistente.lucroTotal = itemExistente.qtd * (precoFinal - produto.precoCusto);
            } else {
                carrinho.push({
                    codigo: produto.codigo, nome: produto.nome, qtd: qtd,
                    precoUnitario: precoFinal, subtotal: qtd * precoFinal,
                    lucroTotal: qtd * (precoFinal - produto.precoCusto)
                });
            }

            document.getElementById('buscaProduto').value = '';
            document.getElementById('qtdProduto').value = '1';
            document.getElementById('buscaProduto').focus();
            atualizarInterface();
        }

        document.getElementById('buscaProduto').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') adicionarAoCarrinho();
        });

        function removerItem(index) {
            carrinho.splice(index, 1);
            atualizarInterface();
            document.getElementById('buscaProduto').focus();
        }

        function atualizarInterface() {
            const lista = document.getElementById('listaCarrinho');
            let total = 0;

            lista.innerHTML = carrinho.map((item, index) => {
                total += item.subtotal;
                return `
                <tr>
                    <td style="font-weight: bold; color: #fff;">${item.nome.toUpperCase()}</td>
                    <td style="text-align: center;">${item.qtd}x</td>
                    <td style="text-align: right; color: var(--text-muted);">R$ ${item.precoUnitario.toFixed(2)}</td>
                    <td style="text-align: right; color: var(--azul-neon); font-weight: bold;">R$ ${item.subtotal.toFixed(2)}</td>
                    <td style="text-align: center;">
                        <button class="btn-sair" onclick="removerItem(${index})" style="padding: 6px;" title="Remover Item">
                            <span class="material-symbols-outlined" style="font-size: 16px;">delete</span>
                        </button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('valorTotal').innerText = `R$ ${total.toFixed(2)}`;
            
            const btnFinalizar = document.getElementById('btnFinalizar');
            if (carrinho.length === 0) {
                btnFinalizar.disabled = true;
                btnFinalizar.style.opacity = "0.5";
            } else {
                btnFinalizar.disabled = false;
                btnFinalizar.style.opacity = "1";
            }
        }

        async function finalizarVenda() {
            if (carrinho.length === 0) return;

            const totalVenda = carrinho.reduce((acc, item) => acc + item.subtotal, 0);
            const lucroVenda = carrinho.reduce((acc, item) => acc + item.lucroTotal, 0);

            const btn = document.getElementById('btnFinalizar');
            btn.innerHTML = `<span class="material-symbols-outlined icone-btn">hourglass_empty</span> PROCESSANDO...`;
            btn.disabled = true;

            try {
                const res = await fetch('/api/vendas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ total: totalVenda, lucro: lucroVenda, itens: carrinho })
                });

                if (res.ok) {
                    alert("✅ Venda Registrada com Sucesso!");
                    carrinho = [];
                    atualizarInterface();
                    await carregarCatalogo();
                } else { alert("❌ Erro ao finalizar a venda."); }
            } catch (e) { alert("❌ Falha na conexão com o servidor."); }

            btn.innerHTML = `<span class="material-symbols-outlined icone-btn" style="font-size: 20px;">payments</span> FINALIZAR VENDA`;
        }

        carregarCatalogo();
    </script>
</body>
</html>
