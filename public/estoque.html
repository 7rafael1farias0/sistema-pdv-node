<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .input-promocao { color: #ff4757 !important; font-weight: bold; }
        .input-custo { color: #aaa !important; }
        tbody tr { transition: background-color 0.4s ease; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav">
            <div class="nav-links">
                <a href="painel.html" class="btn-nav">
                    <span class="material-symbols-outlined icone-btn">home</span> Início
                </a>
            </div>
            <h1>Gestão de Estoque</h1>
            <button class="btn-sair" onclick="fazerLogout()">
                <span class="material-symbols-outlined icone-btn">logout</span> Sair
            </button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card">
                <h3>Novo Produto</h3>
                <input type="text" id="codigo" placeholder="SKU / Código">
                <input type="text" id="nome" placeholder="Nome do Item">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="precoCusto" placeholder="Custo R$" step="0.01">
                    <input type="number" id="precoVenda" placeholder="Venda R$" step="0.01">
                    <input type="number" id="precoPromocao" placeholder="Promoção R$" step="0.01" class="input-promocao">
                </div>
                <input type="number" id="estoque" placeholder="Qtd Inicial (Estoque)">
                <button onclick="salvarProduto()" class="btn-processar" style="width: 100%;">
                    <span class="material-symbols-outlined icone-btn">add_box</span> Cadastrar Produto
                </button>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>
                        <span class="material-symbols-outlined icone-btn" style="color:#aaa;">upload_file</span> Importar Lote CSV
                    </h3>
                    <button onclick="baixarModeloCSV()" class="btn-nav" style="font-size: 10px; border-color: #2ed573; color: #2ed573; padding: 8px 12px;">
                        <span class="material-symbols-outlined icone-btn" style="font-size:14px;">file_download</span> Baixar Modelo
                    </button>
                </div>
                <p style="font-size: 11px; color: #aaa; margin: 15px 0; line-height: 1.5;">Padrão: Código ; Nome ; Custo ; Venda ; Promoção ; Estoque</p>
                <input type="file" id="arquivoCsv" accept=".csv" style="border: 1px dashed #333; padding: 15px; background: transparent; color: #fff; width: 100%; margin-bottom: 15px; font-size:12px;">
                <button onclick="importarCSV()" class="btn-processar" style="width: 100%;">Processar Arquivo</button>
            </div>
        </div>

        <div class="card" style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>PRODUTO</th>
                        <th style="text-align: center; width: 90px;">CUSTO</th>
                        <th style="text-align: center; width: 90px;">VENDA</th>
                        <th style="text-align: center; width: 90px;">PROMO</th>
                        <th style="text-align: center; width: 80px;">ESTOQUE</th>
                        <th style="text-align: center; width: 120px;">AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('pdv_token');
        const cargo = localStorage.getItem('pdv_cargo');
        const authHeader = { 'Authorization': `Bearer ${token}` };

        if (!token || cargo === 'vendedor') window.location.href = 'index.html';

        // 1. CARREGAR LISTA (AGORA DESENHANDO ÍCONES VETORIAIS)
        async function carregarProdutos() {
            try {
                const res = await fetch('/api/produtos', { headers: authHeader });
                const produtos = await res.json();
                
                document.getElementById('corpoTabela').innerHTML = produtos.map(p => {
                    const statusEstoque = p.estoque < 5 ? 'estoque-critico' : '';
                    
                    // Lógica do Botão de Promoção Vetorial
                    const btnPromoClass = p.emPromocao === 1 ? 'btn-processar' : 'btn-nav';
                    // Se estiver ativa, preenchemos o ícone da estrela (FILL 1)
                    const promoIconStyle = p.emPromocao === 1 ? 'font-variation-settings: \'FILL\' 1;' : '';
                    const promoVisor = p.precoPromocao > 0 ? p.precoPromocao : p.precoVenda;

                    return `
                    <tr id="linha-${p.id}">
                        <td style="color: #666; font-size: 11px; font-family: monospace;">${p.codigo}</td>
                        <td style="font-weight: bold; color: #fff;">
                            ${p.nome.toUpperCase()} 
                            ${p.emPromocao === 1 ? '<span style="color:#ff4757; font-size:10px; margin-left:5px; font-weight:normal;">(PROMO)</span>' : ''}
                        </td>
                        <td style="text-align: center;"><input type="number" step="0.01" value="${p.precoCusto}" id="pc-${p.id}" class="input-tabela input-custo" onchange="atualizarProduto(${p.id})"></td>
                        <td style="text-align: center;"><input type="number" step="0.01" value="${p.precoVenda}" id="pv-${p.id}" class="input-tabela" style="color: #00f2fe;" onchange="atualizarProduto(${p.id})"></td>
                        <td style="text-align: center;"><input type="number" step="0.01" value="${promoVisor}" id="pp-${p.id}" class="input-tabela input-promocao" onchange="atualizarProduto(${p.id})"></td>
                        <td style="text-align: center;"><input type="number" value="${p.estoque}" id="est-${p.id}" class="input-tabela ${statusEstoque}" onchange="atualizarProduto(${p.id})"></td>
                        
                        <td style="text-align: center; display: flex; gap: 5px; justify-content: center;">
                            <button class="${btnPromoClass}" onclick="alternarPromocao(${p.id})" style="padding: 7px;" title="Ligar/Desligar Promoção">
                                <span class="material-symbols-outlined" style="font-size: 16px; ${promoIconStyle}">star</span>
                            </button>
                            <button class="btn-sair" onclick="excluirProduto(${p.id})" style="padding: 7px;" title="Excluir Produto">
                                <span class="material-symbols-outlined" style="font-size: 16px;">delete</span>
                            </button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        // ... (Mantenha o resto das funções JS iguazinhas: alternarPromocao, atualizarProduto, salvarProduto, excluirProduto, importarCSV, baixarModeloCSV, fazerLogout) ...
        async function alternarPromocao(id) { try { const res = await fetch(`/api/produtos/${id}/promocao`, { method: 'PUT', headers: authHeader }); if (res.ok) carregarProdutos(); else alert("❌ Apenas gerentes podem alterar status de promoção."); } catch (e) { console.error(e); } }
        async function atualizarProduto(id) { const dados = { estoque: parseInt(document.getElementById(`est-${id}`).value) || 0, precoCusto: parseFloat(document.getElementById(`pc-${id}`).value) || 0, precoVenda: parseFloat(document.getElementById(`pv-${id}`).value) || 0, precoPromocao: parseFloat(document.getElementById(`pp-${id}`).value) || 0 }; const res = await fetch(`/api/produtos/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', ...authHeader }, body: JSON.stringify(dados) }); if (res.ok) { const linha = document.getElementById(`linha-${id}`); linha.style.backgroundColor = "rgba(46, 213, 115, 0.1)"; setTimeout(() => { linha.style.backgroundColor = "transparent"; }, 800); } else { alert("❌ Erro ao salvar."); } }
        async function salvarProduto() { const dados = { codigo: document.getElementById('codigo').value, nome: document.getElementById('nome').value, precoCusto: parseFloat(document.getElementById('precoCusto').value) || 0, precoVenda: parseFloat(document.getElementById('precoVenda').value) || 0, precoPromocao: parseFloat(document.getElementById('precoPromocao').value) || 0, estoque: parseInt(document.getElementById('estoque').value) || 0 }; if(!dados.codigo || !dados.nome) return alert("⚠️ Preencha Código e Nome!"); const res = await fetch('/api/produtos', { method: 'POST', headers: { 'Content-Type': 'application/json', ...authHeader }, body: JSON.stringify(dados) }); if (res.ok) { alert("✅ Produto Cadastrado!"); location.reload(); } }
        async function excluirProduto(id) { if(!confirm("⚠️ Tem certeza que deseja apagar este produto?")) return; const res = await fetch(`/api/produtos/${id}`, { method: 'DELETE', headers: authHeader }); if (res.ok) carregarProdutos(); }
        async function importarCSV() { const input = document.getElementById('arquivoCsv'); if (!input.files[0]) return alert("⚠️ Selecione o arquivo CSV!"); const leitor = new FileReader(); leitor.onload = async (e) => { const linhas = e.target.result.split('\n').slice(1); const produtos = linhas.map(l => { const c = l.split(l.includes(';') ? ';' : ','); if (c.length < 6) return null; return { codigo: c[0].trim(), nome: c[1].trim(), precoCusto: parseFloat(c[2].trim().replace(',','.')) || 0, precoVenda: parseFloat(c[3].trim().replace(',','.')) || 0, precoPromocao: parseFloat(c[4].trim().replace(',','.')) || 0, estoque: parseInt(c[5].trim()) || 0 }; }).filter(p => p); if(produtos.length === 0) return alert("❌ Arquivo fora do formato."); const res = await fetch('/api/produtos/lote', { method: 'POST', headers: { 'Content-Type': 'application/json', ...authHeader }, body: JSON.stringify({ produtos }) }); if(res.ok){ alert("✅ Lote Processado!"); carregarProdutos(); input.value = ""; } }; leitor.readAsText(input.files[0], 'UTF-8'); }
        function baixarModeloCSV() { const conteudoCSV = "Código;Nome;Custo;Venda;Promoção;Estoque\nEX001;Produto Exemplo;10.50;25.00;22.90;100\nEX002;Outro Exemplo;5.00;15.00;15.00;50"; const blob = new Blob([conteudoCSV], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); const url = URL.createObjectURL(blob); link.setAttribute("href", url); link.setAttribute("download", "modelo_importacao_pdv.csv"); link.style.visibility = 'hidden'; document.body.appendChild(link); link.click(); document.body.removeChild(link); }
        function fazerLogout() { localStorage.clear(); window.location.href = 'login.html'; }
        
        carregarProdutos();
    </script>
</body>
</html>
